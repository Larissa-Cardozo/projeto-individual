<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="loginCadastro.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Telex&display=swap" rel="stylesheet">

    <title>Página de cadastro</title>
</head>
<body>
    <div class="container">
        <div class="esquerdo">
    <a href="index.html" class="voltar-home">Voltar</a>
            <h2>AINDA NÃO TEM UMA CONTA? CRIE JÁ!</h2>
            <img src="./assets/evolucao.gif" alt="" class="img">
            <p>Acompanhe aqui seu progresso!</p>
            <p>Possui uma conta? <a href="login.html">Login!</a></p>
        </div>

        <div class="direito">
            <h2>CADASTRO</h2>
             <div id="exibir"></div>
            <div class="forms">
                <div class="inputs">
                    <label for="ipt_nome">Insira aqui seu nome:</label>
                    <input type="text" id="ipt_nome">

                    <label for="ipt_email">Insira aqui seu email:</label>
                    <input type="text" id="ipt_email">

                    <label for="ipt_senha">Insira aqui sua senha:</label>
                    <input type="password" id="ipt_senha">

                    <label for="ipt_confirmacao">Confirme sua senha:</label>
                    <input type="password" id="ipt_confirmacao">
                </div>

                <button class="botao" onclick="cadastrar()">Entrar</button>
            </div>
        </div>
    </div>
</body>
</html>

<script>

  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = ipt_nome.value;
    var emailVar = ipt_email.value;
    var senhaVar = ipt_senha.value;
    var confirmacaoSenhaVar = ipt_confirmacao.value;

    let mensagem = ""
    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {
      mensagem = `<p class="exibir erro">Todos os campos devem ser prenchidos</p>`;
      exibir.innerHTML = mensagem;;

      finalizarAguardar();
      return false;
    } else if(!emailVar.includes('@') || !emailVar.includes('.')){
            mensagem = `<p class="exibir erro">Email inválido</p>`;
            exibir.innerHTML = mensagem;

            finalizarAguardar();
            return false;
        }else if(senhaVar !== confirmacaoSenhaVar){
             mensagem = `<p class="exibir erro">Senhas Divergentes</p>`;
            exibir.innerHTML = mensagem;

            finalizarAguardar();
            return false;
        }else{
             // Enviando o valor da nova input
            fetch("/usuarios/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                // crie um atributo que recebe o valor recuperado aqui
                // Agora vá para o arquivo routes/usuario.js
                nomeServer: nomeVar,
                emailServer: emailVar,
                senhaServer: senhaVar,
                confirmacaoServer: confirmacaoSenhaVar
            }),
            })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                 mensagem = `<p class="exibir sucesso">Cadastro realizado com sucesso!</p>`;
                exibir.innerHTML = mensagem;

                setTimeout(() => {
                    window.location = "login.html";
                }, "2000");

                limparFormulario();
                finalizarAguardar();
                } else {
                throw "Houve um erro ao tentar realizar o cadastro!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
                finalizarAguardar();
            });

            return false;
        }
        
    }

   
</script>
