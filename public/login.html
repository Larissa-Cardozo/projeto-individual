<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="loginCadastro.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Telex&display=swap" rel="stylesheet">

    <title>Página de login</title>
</head>
<body>
    
    <div class="container">
        <div class="esquerdo">
            <a href="index.html" class="voltar-home">Voltar</a>
            <h2>BEM-VINDO DE VOLTA, MESTRE POKÉMON!</h2>
            <img src="./assets/esperando.gif" alt="" class="img">

            <p>Ainda não tem uma conta no nosso site? <a href="cadastro.html">Crie já a sua!</a></p>
        </div>

        <div class="direito">
            <h2>LOGIN</h2>
            <div class="forms">
                 <div class="inputs">
                    <label for="inputEmail">Insira aqui seu email:</label>
                    <input type="text" id="ipt_email" required>

                    <label for="inputSenha">Insira aqui sua senha:</label>
                    <input type="password" id="ipt_senha" required>
                </div>
                <button class="botao" onclick="entrar()">Entrar</button>
            </div>
            <div id="exibir" class="exibir"></div>
        </div>
    </div>
</body>
</html>

 <script>

    function limparFormulario(){
        ipt_email.value = ""
        ipt_senha.value = ""
    }

    function entrar(){
          //aguardar();

        var emailVar = ipt_email.value;
        var senhaVar = ipt_senha.value;
        let mensagem = ""
        
        if (emailVar == "" || senhaVar == "") {
            mensagem += `<p class="exibir erro">Todos os campos devem ser preenchidos</p>`;
            exibir.innerHTML = mensagem;
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;

                    setTimeout(function () {
                        window.location = "./dashboard/cards.html";
                        limparFormulario();
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        exibir.style.display = "none"
    }

</script>
